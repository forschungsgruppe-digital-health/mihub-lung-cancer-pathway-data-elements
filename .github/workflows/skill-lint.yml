name: Skill Lint

on:
  push:
    branches: [main, dev]
    paths:
      - 'skills/**'
      - '.claude/skills/**'
      - '.claude/agents/**'
      - '.codex/skills/**'
      - '.github/copilot-instructions.md'
      - '.github/scripts/validate-agent-skills.py'
      - 'AGENTS.md'
  pull_request:
    paths:
      - 'skills/**'
      - '.claude/skills/**'
      - '.claude/agents/**'
      - '.codex/skills/**'
      - '.github/copilot-instructions.md'
      - '.github/scripts/validate-agent-skills.py'
      - 'AGENTS.md'

jobs:
  skill-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate Agent Skills + subagents (vendor-neutral discovery)
        run: python3 .github/scripts/validate-agent-skills.py
