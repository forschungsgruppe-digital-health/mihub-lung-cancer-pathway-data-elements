  resource: CarePlan
  path: CarePlan.intent='plan'
care_process:
  trigger: Erstellung bei Therapieabschluss; Vorlage in der Erstvorstellung 8 Wochen nach Therapieende.
  frequency_pattern: once-per-treatment-completion
  responsible_role: Lead-Clinician (Onkologe / Pneumologe / Thoraxchirurg)
