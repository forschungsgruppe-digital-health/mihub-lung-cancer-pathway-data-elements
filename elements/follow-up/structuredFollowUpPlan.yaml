name: structuredFollowUpPlan
label_de: Strukturierter Nachsorgeplan vorhanden
definition_de: Dokumentiert, ob nach Abschluss einer multimodalen Therapie mit kurativem Anspruch (Stadium
  I–IIIC, OMD) ein strukturierter, schriftlicher Nachsorgeplan erstellt wurde, der Rezidive, Zweitkarzinome,
  Komplikationen, Toxizitäten sowie Bedarf an Psychoonkologie und Sozialberatung erfassen kann.
phase: followup
