name: illnessPhase
label_de: Krankheitsphase
definition_de: 'Phase im Krankheitsverlauf gemäß Australian Palliative Care Phases: stabil, instabil,
  verschlechternd, sterbend.'
phase: palliative
tumor_entity:
- NSCLC
- SCLC
datatype: code
cardinality: 1..1
value_set:
  binding_strength: example
  standard_binding_status: no-standard-found
  notes: Krankheitsphasen-Konzept der Australian Palliative Care Phases (stable / unstable / deteriorating
    / dying / bereaved), in der deutschen S3-LL Palliativ Kap. 5.3 + Tab. 6 übernommen. SNOMED CT International
    hat keine entsprechenden Codes; die Australian SNOMED-CT-Edition pflegt eigene Codes (z. B. Stable
    phase, Unstable phase) — Migration auf Australian-Edition oder Refset-Vorschlag in nachgelagerter
    Iteration.
  codings:
  - system: local-no-standard-binding
    code: stable
    display: stabil
  - system: local-no-standard-binding
    code: unstable
    display: instabil
  - system: local-no-standard-binding
    code: deteriorating
    display: verschlechternd
  - system: local-no-standard-binding
    code: dying
    display: sterbend (terminal)
  - system: kdl
    code: SD110105
    display: Palliativmedizinische Komplexbehandlungsdokumentation
care_process:
  trigger: bei jeder Visite
  frequency_pattern: per-encounter (täglich in Sterbephase)
  responsible_role: Palliativ-Team
evidence:
  guideline_references:
